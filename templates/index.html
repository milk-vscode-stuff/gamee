<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial;
        }

        canvas {
            display: block;
            background: black;
        }

        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #5865f2;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="menu">
    <h2>Enter Name</h2>
    <input id="nameInput" placeholder="name">
    <button onclick="start()">Start</button>
</div>

<canvas id="c"></canvas>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let id = Math.random().toString(36).substr(2);

let players = {};
let renderPlayers = {};

let started = false;
let myName = "";

let myPlayer = { x: 200, y: 200, speed: 4 };

const keys = {};

window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// JOIN GAME
function start() {
    myName = document.getElementById("nameInput").value;
    document.getElementById("menu").style.display = "none";

    socket.emit("join", { id, name: myName });
    started = true;
}

// SERVER UPDATE
socket.on("players_update", (data) => {
    players = data;

    for (let p in players) {
        if (!renderPlayers[p]) {
            renderPlayers[p] = {
                x: players[p].x,
                y: players[p].y
            };
        }
    }
});

// LERP FUNCTION
function lerp(a, b, t) {
    return a + (b - a) * t;
}

// UPDATE MOVEMENT
function update() {
    if (!started) return;

    let dx = 0, dy = 0;

    if (keys["w"] || keys["ArrowUp"]) dy -= 1;
    if (keys["s"] || keys["ArrowDown"]) dy += 1;
    if (keys["a"] || keys["ArrowLeft"]) dx -= 1;
    if (keys["d"] || keys["ArrowRight"]) dx += 1;

    myPlayer.x += dx * myPlayer.speed;
    myPlayer.y += dy * myPlayer.speed;

    socket.emit("move", {
        id,
        x: myPlayer.x,
        y: myPlayer.y
    });
}

// SMOOTHING
function smooth() {
    for (let p in players) {
        if (!renderPlayers[p]) continue;

        renderPlayers[p].x = lerp(renderPlayers[p].x, players[p].x, 0.15);
        renderPlayers[p].y = lerp(renderPlayers[p].y, players[p].y, 0.15);
    }
}

// DRAW
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let p in players) {

        let r = renderPlayers[p] || players[p];

        ctx.fillStyle = (p === id) ? "lime" : "red";
        ctx.fillRect(r.x, r.y, 30, 30);

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(players[p].name, r.x + 15, r.y - 10);
    }
}

// LOOP
function loop() {
    update();
    smooth();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
